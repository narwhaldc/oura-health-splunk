[Ring Battery Drain Model Refresh]
description = Learns a TWO-PHASE (piecewise-linear) battery drain model from recent real \
    discharge cycles. Oura battery discharge has a clear knee: ~2 %/hr above ~60%, then a \
    ~8 %/hr cliff below it. A single linear slope (the old model) splits the difference and \
    overestimates time-left when low. We compute each phase's drain rate PER CYCLE then take \
    the median across cycles (robust to cycles of differing duration — pooling raw points \
    across fast/slow cycles corrupts a global fit). Retrains daily; logs params for the \
    oura_ring Battery Model panel and the Time-to-Empty forecast.
search = index=oura oura_data_type=battery \
    | sort _time \
    | streamstats reset_on_change=true window=1 current=false last(charging) as prev_charging last(in_charger) as prev_in_charger \
    | eval was_plugged=if(prev_charging="true" OR prev_in_charger="true", 1, 0) \
    | eval segment_start=if(was_plugged=1 AND charging="false" AND in_charger="false", 1, 0) \
    | streamstats sum(segment_start) as segment_id \
    | where charging="false" AND in_charger="false" \
    | eventstats min(_time) as seg_unplug max(level) as seg_max min(level) as seg_min count as seg_n by segment_id \
    | eval seg_drop=seg_max-seg_min \
    | where seg_drop>=40 AND seg_n>=8 \
    | eval hrs=(_time-seg_unplug)/3600, phase=if(level>=60,"top","bot") \
    | stats min(level) as ymin max(level) as ymax min(hrs) as xmin max(hrs) as xmax by segment_id phase \
    | eval span=xmax-xmin, drop=ymax-ymin \
    | where span>0.5 AND drop>=8 \
    | eval rate=drop/span \
    | stats median(eval(if(phase="top",rate,null()))) as rate_top median(eval(if(phase="bot",rate,null()))) as rate_bot dc(segment_id) as training_segments count as phase_samples \
    | eval breakpoint=60, rate_top=round(rate_top,3), rate_bot=round(rate_bot,3) \
    | eval trained_at=now(), trained_at_str=strftime(trained_at,"%Y-%m-%d %H:%M:%S") \
    | eval algorithm="Piecewise Linear (2-phase)" \
    | eval oura_data_type="battery_model" \
    | eval _time=trained_at \
    | collect index=oura sourcetype=oura:ring_model
dispatch.earliest_time = -21d
dispatch.latest_time = now
cron_schedule = 0 3 * * *
enableSched = 1
disabled = 0
alert.track = 0

[Resting HR Baseline Refresh]
description = Computes a stable resting-HR baseline for Karvonen (%HRR) heart \
    rate zone calculations on the Activity dashboard. Uses the median of each \
    day's minimum bpm over a trailing 30-day window, not a raw min() — a \
    single bad sensor reading shouldn't permanently anchor the baseline low. \
    Written back via collect so dashboard panels do a cheap lookup instead of \
    re-scanning 30 days of heart_rate data on every panel load.
search = index=oura oura_data_type=heart_rate \
    | dedup timestamp \
    | eval day=strftime(_time,"%Y-%m-%d") \
    | stats min(bpm) as daily_min by day \
    | stats median(daily_min) as resting_hr_baseline, count as days_used \
    | eval computed_at=now() \
    | eval computed_at_str=strftime(computed_at,"%Y-%m-%d %H:%M:%S") \
    | eval oura_data_type="resting_hr_baseline" \
    | eval _time=computed_at \
    | collect index=oura sourcetype=oura:ring_model
dispatch.earliest_time = -30d
dispatch.latest_time = now
cron_schedule = 0 4 * * *
enableSched = 1
disabled = 0
alert.track = 0

[Oura Dedup — Pass 1: Tag Duplicates]
description = Identifies duplicate events by _raw content and writes their _cd values to \
    oura_dup_events.csv — first occurrence of each _raw is kept; every later copy is listed. \
    Pass 2 reads that lookup and deletes the matching events. (The lookup must contain the \
    _cd list; do NOT append a trailing stats/outputlookup here — it overwrites the list with \
    a summary row and Pass 2 then finds nothing to delete.)
search = index=oura \
    | streamstats count as _rank by _raw \
    | where _rank > 1 \
    | eval event_cd=_cd \
    | table event_cd \
    | outputlookup oura_dup_events.csv
dispatch.earliest_time = 0
dispatch.latest_time = now
cron_schedule = 0 2 * * *
enableSched = 1
disabled = 0
alert.track = 0

[Oura Dedup — Pass 2: Delete Duplicates]
description = Deletes events tagged by Pass 1. Reads oura_dup_events.csv \
    written by Pass 1 and deletes matching events. If Pass 1 found no dups \
    the lookup is empty and nothing is deleted. If Pass 1 did not run, \
    yesterday's stale _cd values point to already-deleted events and match \
    nothing. Requires can_delete capability on the running user/role.
search = index=oura \
    | eval event_cd=_cd \
    | lookup oura_dup_events.csv event_cd OUTPUT event_cd AS dup_match \
    | where isnotnull(dup_match) \
    | delete
dispatch.earliest_time = 0
dispatch.latest_time = now
cron_schedule = 15 2 * * *
enableSched = 1
disabled = 0
alert.track = 0

[Oura Dedup — Verify: Check for Remaining Duplicates]
description = Quick health check — reports total events, unique events, \
    duplicate count, and dup percentage. If dup_events is 0, the index is \
    clean. Run anytime from the saved searches list.
search = index=oura \
    | stats count as total_events dc(_raw) as unique_events \
    | eval dup_events=total_events-unique_events \
    | eval dup_pct=round(dup_events/total_events*100, 1) \
    | table total_events unique_events dup_events dup_pct
dispatch.earliest_time = 0
dispatch.latest_time = now
enableSched = 0
disabled = 0
alert.track = 0
