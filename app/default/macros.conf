#   widx — the index(es) the dashboards search.
#   Bridges Oura data across the legacy `index=oura` and the platform
#   `index=wearables`, so this app keeps its full history while new data flows only
#   to index=wearables. dedup in the searches collapses the dual-fed overlap; Garmin
#   data (index=wearables only) is naturally excluded because these queries filter on
#   oura_data_type, which Garmin events don't have.
#   Deployment knob: change this ONE line to point the whole app at a different index
#   (or drop index=oura once its legacy tail ages out).
[widx]
definition = (index=oura OR index=wearables)
iseval = 0
